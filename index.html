<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T Style</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --primary:#06ac00;
  --dark:#0a0a0a;
  --gray:#141414;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  background:var(--dark);
  color:#fff;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  background:#000;
  padding:10px 12px;
  border-bottom:1px solid var(--primary);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  font-size:16px;
  color:var(--primary);
  letter-spacing:2px;
}

/* REDES */
nav i{
  font-size:18px;
  margin-left:10px;
  transition:0.2s;
}

nav i:hover{
  color:var(--primary);
  transform:scale(1.2);
}

/* BOTÃO */
.buy-btn{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  background:var(--primary);
  color:#000;
  padding:14px 25px;
  border-radius:30px;
  font-weight:bold;
  font-size:16px;
  text-decoration:none;
  box-shadow:0 0 15px var(--primary);
  animation:pulse 1.5s infinite;
}

/* ANIMAÇÃO */
@keyframes pulse{
  0%{box-shadow:0 0 5px var(--primary);}
  50%{box-shadow:0 0 20px var(--primary);}
  100%{box-shadow:0 0 5px var(--primary);}
}

/* HERO */
.hero{
  margin-top:55px;
  height:28vh;
  position:relative;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.4);
}

.hero-text{
  position:absolute;
  bottom:10px;
  left:10px;
}

.hero-text h2{
  font-size:18px;
  color:var(--primary);
}

.hero-text p{
  font-size:12px;
}

/* SEÇÕES */
section{
  padding:15px 10px;
}

h2{
  font-size:16px;
  color:var(--primary);
  margin-bottom:8px;
}

p{
  font-size:12px;
  color:#aaa;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.card{
  background:var(--gray);
  border-radius:8px;
  overflow:hidden;
  border:1px solid #222;
  transition:0.2s;
}

.card:hover{
  border-color:var(--primary);
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

.card h3{
  font-size:13px;
  padding:8px;
}

/* DESKTOP */
@media(min-width:768px){
  .grid{
    grid-template-columns:repeat(4,1fr);
  }
}
</style>
</head>

<body>

<header>
  <h1>T STYLE(teste)</h1>

 <nav>
  <a href="https://maps.google.com/?q=Montes+Claros+MG" target="_blank" class="map-link">
    <i class="fas fa-location-dot"></i>
  </a>

  <a href="https://wa.me/553899999999" target="_blank">

  <a href="https://instagram.com" target="_blank">
    <i class="fab fa-instagram"></i>
  </a>

  <a href="https://tiktok.com" target="_blank">
    <i class="fab fa-tiktok"></i>
  </a>
</nav>
</header>

<div class="hero">
  <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
  <div class="hero-text">
    <h2>teste</h2>
    <p>teste</p>
  </div>
</div>

<section>
  <h2>teste</h2>

</section>

<section>
  <h2>Categorias</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
      <h3>Camisetas</h3>
    </div>

    <div class="card">

</html>
