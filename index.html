<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T Style</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --primary:#009200;
  --dark:#0a0a0a;
  --gray:#151515;
  --light:#f5f5f5;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  background:var(--dark);
  color:var(--light);
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  background:#000;
  padding:15px;
  border-bottom:2px solid var(--primary);
  text-align:center;
}

header h1{
  font-size:20px;
  color:var(--primary);
  letter-spacing:3px;
}

/* BOTÃO GRANDE */
.buy-btn{
  display:block;
  width:90%;
  margin:10px auto 0;
  padding:14px;
  background:var(--primary);
  color:#000;
  font-weight:bold;
  border-radius:30px;
  font-size:16px;
  text-decoration:none;
}

/* HERO */
.hero{
  margin-top:110px;
  height:40vh;
  position:relative;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.5);
}

.hero-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.hero-text h2{
  font-size:26px;
  color:var(--primary);
}

.hero-text p{
  font-size:15px;
}

/* SEÇÕES */
section{
  padding:30px 15px;
  text-align:center;
}

h2{
  font-size:22px;
  color:var(--primary);
  margin-bottom:15px;
}

p{
  font-size:15px;
  color:#ccc;
}

/* CATEGORIAS */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.card{
  background:var(--gray);
  border-radius:10px;
  overflow:hidden;
  border:1px solid #222;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card h3{
  padding:12px;
  font-size:16px;
}

/* FOOTER */
footer{
  background:#000;
  padding:20px;
  text-align:center;
  border-top:2px solid var(--primary);
}

footer i{
  font-size:28px;
  margin:0 15px;
  transition:0.3s;
}

footer i:hover{
  color:var(--primary);
  transform:scale(1.2);
}

/* DESKTOP */
@media(min-width:768px){
  .grid{
    grid-template-columns:repeat(4,1fr);
  }

  .hero{
    height:60vh;
  }
}
</style>
</head>

<body>

<header>
  <h1>T STYLE</h1>

  <a class="buy-btn" href="https://wa.me/553899999999?text=ola%2C%20aguardo%20o%20atendimento" target="_blank">
    Comprar agora
  </a>
</header>

<div class="hero">
  <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
  <div class="hero-text">
    <h2>Vista sua atitude</h2>
    <p>Moda urbana moderna</p>
  </div>
</div>

<section>
  <h2>Sobre</h2>
  <p>Marca focada em estilo urbano, com peças modernas e identidade única.</p>
</section>

<section>
  <h2>Categorias</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
      <h3>Camisetas</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
      <h3>Moletons</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
      <h3>Acessórios</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1542060748-10c28b62716f">
      <h3>Calças</h3>
    </div>

  </div>

</section>

<footer>
  <a href="https://wa.me/553899999999" target="_blank"><i class="fab fa-whatsapp"></i></a>
  <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
  <a href="https://tiktok.com" target="_blank"><i class="fab fa-tiktok"></i></a>
</footer>

</body>
</html>
